name: Documentation
description: Request a documentation addition, correction, or clarification.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link or describe the affected page/file.
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: Requested change
      description: What needs to be clearer, corrected, or added?
    validations:
      required: true

