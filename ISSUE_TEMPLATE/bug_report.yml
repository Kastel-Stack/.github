name: Bug report
description: Report a reproducible issue in a public Kastel repository.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest reproducible case.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Repo, file, schema, template, runtime, or connector affected.

